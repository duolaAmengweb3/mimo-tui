name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0-alpha)'
        required: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: mimo

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          # Intel mac runners often queue for very long. We accept that this
          # build can fail / time out without blocking the release.
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
            optional: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux cross-compile)
        if: contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64'))
        run: cargo install cross --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"musl"* ]] || [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --release --target ${{ matrix.target }} -p mimo-tui
          else
            cargo build --release --target ${{ matrix.target }} -p mimo-tui
          fi

      - name: Strip binary
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/${{ matrix.target }}/release/${{ env.BIN_NAME }}
          [[ -f "$BIN" ]] && strip "$BIN" || true

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -e
          TARGET=${{ matrix.target }}
          BIN=${{ env.BIN_NAME }}
          STAGE=mimo-${TARGET}
          mkdir -p "$STAGE"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${TARGET}/release/${BIN}.exe" "${STAGE}/"
            7z a "${STAGE}.zip" "${STAGE}"
            echo "asset=${STAGE}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${TARGET}/release/${BIN}" "${STAGE}/"
            tar czf "${STAGE}.tar.gz" "${STAGE}"
            echo "asset=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256
        shell: bash
        run: |
          ASSET=${{ steps.pkg.outputs.asset }}
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          else
            sha256sum "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

  release:
    name: GitHub Release
    needs: build
    # Don't block release on a single platform's queue timeout (e.g. Intel mac).
    # Run as long as the build job didn't get fully cancelled.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to flat dir
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec mv {} dist/ \;
          ls -lh dist

      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
          files: dist/*
