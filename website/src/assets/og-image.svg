<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>mimo-tui · OG image (1200x630)</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo: ∞ mimo-tui -->
  <text x="120" y="340" font-family="Inter, sans-serif" font-size="240" font-weight="900" fill="url(#grad)">∞</text>
  <text x="380" y="305" font-family="Inter, sans-serif" font-size="120" font-weight="800" letter-spacing="-3" fill="#f5f5f5">mimo-tui</text>

  <!-- Tagline -->
  <text x="120" y="430" font-family="Inter, sans-serif" font-size="34" font-weight="500" fill="#a3a3a3">MiMo 模型的原创开源终端 AI 编程 agent</text>
  <text x="120" y="478" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#737373">像 Claude Code · Codex CLI 一样，但是给 MiMo 用</text>

  <!-- URL + 版本 -->
  <text x="120" y="560" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="24" font-weight="500" fill="#a3a3a3">$ npm install -g mimo-tui</text>
  <text x="940" y="560" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="22" font-weight="500" fill="#6b7280">mimo-tui.pages.dev</text>
</svg>
